const parseDeadline = (deadline) => {
  if (!deadline || deadline === 'Rolling' || deadline.includes('*') || deadline.includes('(')) return null;
  if (deadline.includes('/')) {
    const parts = deadline.split('/');
    if (parts.length === 3) return new Date(parts[2], parts[0] - 1, parts[1]);
  }
  const date = new Date(deadline);
  return isNaN(date.getTime()) ? null : date;
};

const isExpired = (deadline) => {
  const date = parseDeadline(deadline);
  if (!date) return false;
  return date < new Date();
};

const getStatus = (deadline) => {
  if (!deadline) return 'TBD';
  if (deadline === 'Rolling' || deadline.toLowerCase().includes('rolling')) return 'Open';
  const date = parseDeadline(deadline);
  if (!date) return 'Open';
  if (date < new Date()) return 'Closed';
  const daysUntil = Math.ceil((date - new Date()) / (1000 * 60 * 60 * 24));
  if (daysUntil <= 14) return 'Closing Soon';
  return 'Open';
};

const formatDeadline = (deadline) => {
  if (!deadline) return 'TBD';
  if (deadline === 'Rolling') return 'Rolling';
  const date = parseDeadline(deadline);
  if (!date) return deadline;
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};

const getDeadlineMonth = (deadline) => {
  const date = parseDeadline(deadline);
  if (!date) return null;
  return date.toLocaleDateString('en-US', { month: 'long' });
};

    return ['All', ...uniqueMonths.sort((a, b) => monthOrder.indexOf(a) - monthOrder.indexOf(b))];
  }, []);

  const filteredData = useMemo(() => {
    let data = opportunitiesData.filter(opp => {
      const expired = isExpired(opp.external_deadline);
      if (activeTab === 'active' && expired) return false;
      if (activeTab === 'archived' && !expired) return false;
      if (searchQuery) {
        const query = searchQuery.toLowerCase();
        const searchFields = [opp.sponsor, opp.program_name, opp.keywords, opp.notes].join(' ').toLowerCase();
        if (!searchFields.includes(query)) return false;
      }
      if (typeFilter !== 'All' && opp.type !== typeFilter) return false;
      if (monthFilter !== 'All' && getDeadlineMonth(opp.external_deadline) !== monthFilter) return false;
      if (earlyInvestigatorOnly && !opp.early_investigator) return false;
      if (showOpenOnly && getStatus(opp.external_deadline) === 'Closed') return false;
      return true;
    });

    data.sort((a, b) => {
      let aVal, bVal;
      if (sortConfig.key === 'external_deadline') {
        const aDate = parseDeadline(a.external_deadline);
        const bDate = parseDeadline(b.external_deadline);
        if (!aDate && !bDate) return 0;
        if (!aDate) return 1;
        if (!bDate) return -1;

      } else {
        aVal = a[sortConfig.key] || '';
        bVal = b[sortConfig.key] || '';

      if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;

                            <div className="text-sm text-gray-500 mt-0.5">{opp.sponsor}</div>
                            {opp.early_investigator && (
                              <span className="inline-block mt-1 px-2 py-0.5 bg-green-100 text-green-700 text-xs rounded-full">Early Investigator</span>
                            )}
                          </td>
                          <td className="px-4 py-4 text-gray-700 whitespace-nowrap">{formatDeadline(opp.external_deadline)}</td>
                          <td className="px-4 py-4 text-gray-600 text-sm">{opp.type || 'N/A'}</td>
                          <td className="px-4 py-4">
                            <span className={`inline-block px-2 py-1 rounded text-xs font-medium ${
                              status === 'Open' ? 'bg-green-100 text-green-700' :
                              status === 'Closing Soon' ? 'bg-yellow-100 text-yellow-700' :
                              status === 'Closed' ? 'bg-red-100 text-red-700' :
                              'bg-gray-100 text-gray-600'
                            }`}>
                              {status === 'Open' ? 'Available' : status === 'Closing Soon' ? 'Closing Soon' : status}
                            </span>
                          </td>
                        </tr>
                        {isOpen && (
                          <tr className="bg-teal-50/50">
                            <td colSpan={5} className="px-8 py-4">
                              <div className="grid grid-cols-2 gap-4 text-sm">
                                <div><span className="font-medium text-gray-700">Funder:</span> <span className="text-gray-600">{opp.sponsor}</span></div>
                                <div><span className="font-medium text-gray-700">Award Amount:</span> <span className="text-gray-600">{opp.award_amount || 'Not specified'}</span></div>
                                <div><span className="font-medium text-gray-700">Internal Deadline:</span> <span className="text-gray-600">{opp.internal_deadline || 'N/A'}</span></div>
                                <div><span className="font-medium text-gray-700">Limitation:</span> <span className="text-gray-600">{opp.limitation ? `${opp.limitation} per institution` : 'None'}</span></div>
                                <div className="col-span-2"><span className="font-medium text-gray-700">Keywords:</span> <span className="text-gray-600">{opp.keywords || 'N/A'}</span></div>
                                {opp.notes && <div className="col-span-2"><span className="font-medium text-gray-700">Eligibility Notes:</span> <span className="text-gray-600">{opp.notes}</span></div>}
                              </div>
                            </td>
                          </tr>
                        )}
                      </React.Fragment>
                    );
                  })
                )}
              </tbody>
            </table>
          </div>
        </div>

        {/* Pagination */}
        {totalPages > 1 && (
          <div className="flex items-center justify-center gap-2 mt-6">
            <button
              onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
              disabled={currentPage === 1}
              className="px-3 py-1 rounded border border-gray-300 text-gray-700 hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed"
            >
              Previous
            </button>
            {Array.from({ length: Math.min(5, totalPages) }, (_, i) => {
              let pageNum;
              if (totalPages <= 5) pageNum = i + 1;
              else if (currentPage <= 3) pageNum = i + 1;
              else if (currentPage >= totalPages - 2) pageNum = totalPages - 4 + i;
              else pageNum = currentPage - 2 + i;
              return (
                <button
                  key={pageNum}
                  onClick={() => setCurrentPage(pageNum)}
                  className={`w-8 h-8 rounded font-medium ${
                    currentPage === pageNum ? 'bg-[#006B5A] text-white' : 'border border-gray-300 text-gray-700 hover:bg-gray-100'
                  }`}
                >
                  {pageNum}
                </button>
              );
            })}
            <button
              onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
              disabled={currentPage === totalPages}
              className="px-3 py-1 rounded border border-gray-300 text-gray-700 hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed"
            >
              Next
            </button>
          </div>
        )}

        {/* Footer */}
        <div className="mt-8 text-center text-sm text-gray-500">
          <p>Expired opportunities automatically move to the Archive tab.</p>
          <p className="mt-1">Questions? Contact <a href="mailto:limitedsubmissions@umd.edu" className="text-[#006B5A] hover:underline">limitedsubmissions@umd.edu</a></p>
        </div>
      </div>
      </>
      )}

      {/* Footer Bar */}
      <div className="bg-gray-100 border-t border-gray-200 mt-auto py-4">
        <div className="max-w-7xl mx-auto px-6 text-center text-sm text-gray-600">
          <p>© {new Date().getFullYear()} University of Maryland, Division of Research</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
